apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: frontend
  labels:
    project: roboshop
    tier: frontend
    purpose: replicaset

spec:
  # modify replicas according to your case
  replicas: 3
  selector:
    matchLabels:
    project: roboshop
    tier: frontend
    purpose: replicaset
    
  template:
    metadata:
      labels:
        project: roboshop
        tier: frontend
        purpose: replicaset
