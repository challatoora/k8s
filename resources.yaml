apiVersion: v1
Kind: Pod
metadata:
  name: resources-demo
spec:
  containers:
  - name: nginx
    image: nginx
    resources:
        # soft limit
      requests:
        memory: "64mi" #RAM
        cpu: "100m" #cpu

      # hard limit
      limits:
        memory: "128mi" #RAM
        cpu: "150m" #cpu