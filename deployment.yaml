apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    project: roboshop
    tier: frontend
    purpose: rs-demo

spec:
  # modify replicas according to your case
  replicas: 2
  selector:
    matchLabels:
      project: roboshop
      tier: frontend
      purpose: replicaset
    
  template:
    metadata:
      labels:
        project: roboshop
        tier: frontend
        purpose: replicaset
    spec:
      containers:
      - name: nginx
        image: nginx:stable-alpine3.23-perl
